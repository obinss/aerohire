version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aerohire
      POSTGRES_USER: aerohire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aerohire" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aerohire_net

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redissecret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aerohire_net

  # ── DB Setup / Migrations ───────────────────────────────────────────────
  db_setup:
    image: ghcr.io/${GITHUB_REPOSITORY:-aerohire/aerohire}/backend:${IMAGE_TAG:-latest}
    command: prisma db push --schema=./packages/db/schema.prisma --accept-data-loss
    environment:
      DATABASE_URL: postgresql://aerohire:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/aerohire
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aerohire_net

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-aerohire/aerohire}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}/api
    depends_on:
      - backend
    networks:
      - aerohire_net

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-aerohire/aerohire}/backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aerohire:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/aerohire
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      RESEND_API_KEY: ${RESEND_API_KEY}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db_setup:
        condition: service_completed_successfully
    networks:
      - aerohire_net

  # ── Celery Worker ───────────────────────────────────────────────────────
  celery_worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-aerohire/aerohire}/backend:${IMAGE_TAG:-latest}
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aerohire:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/aerohire
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db_setup:
        condition: service_completed_successfully
    networks:
      - aerohire_net

  # ── Celery Beat (CRON Scheduler) ────────────────────────────────────────
  celery_beat:
    image: ghcr.io/${GITHUB_REPOSITORY:-aerohire/aerohire}/backend:${IMAGE_TAG:-latest}
    command: celery -A worker.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aerohire:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/aerohire
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
    depends_on:
      - celery_worker
      - db_setup
    networks:
      - aerohire_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - aerohire_net

  # ── Certbot (SSL) ───────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

    # ── Networks ─────────────────────────────────────────────────────────────────
networks:
  aerohire_net:
    driver: bridge
